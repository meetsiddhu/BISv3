gisHelpTitle=GIS Configuration: Help
gisClose=Close
gisHelpHtml=<h4>Purpose</h4><p>GIS Config controls the default map appearance and advanced GIS feature flags for all users of the Map View application.</p><h4>Basemap Settings</h4><p>Set the <strong>Default Basemap</strong> shown when users open the map (e.g. OpenStreetMap, Esri Satellite). If you enable HERE Maps, enter your HERE Maps API Key.</p><h4>Reference Layers</h4><p>Toggle default visibility of <strong>State Boundaries</strong> and <strong>LGA Boundaries</strong> overlay layers.</p><h4>Advanced GIS Features</h4><ul><li><strong>Scale Bar:</strong> distance scale on the map.</li><li><strong>GPS / Locate Me:</strong> browser geolocation button.</li><li><strong>Mini Map:</strong> overview inset map (bottom-right corner).</li><li><strong>Heat Map:</strong> density overlay by condition rating.</li><li><strong>Time Slider:</strong> filter bridges by year built.</li><li><strong>Stats Panel:</strong> live statistics sidebar.</li><li><strong>Proximity Analysis:</strong> find bridges within a radius.</li><li><strong>MGA Coordinates:</strong> show MGA grid reference alongside decimal degrees.</li><li><strong>Condition Alerts:</strong> highlight bridges below the alert threshold.</li><li><strong>Custom WMS:</strong> allow adding external WMS tile layers.</li><li><strong>Server-side Clustering:</strong> cluster markers server-side for large datasets.</li></ul><h4>Thresholds</h4><p>Set numeric defaults: condition alert threshold, proximity search radius, and heatmap parameters.</p><h4>Saving</h4><p>Click <strong>Save</strong> to apply changes immediately. Changes take effect for all users on their next map load.</p>

