  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ushell.Container
        .createRenderer('fiori2', true)
        .then(function (renderer) { renderer.placeAt('content') })

      function titleForHash() {
        var hash = window.location.hash || ''
        if (hash.indexOf('/BridgeInspections') !== -1 || hash.indexOf('BridgeInspections-manage') !== -1) return 'Inspections'
        if (hash.indexOf('/BridgeDefects') !== -1 || hash.indexOf('BridgeDefects-manage') !== -1) return 'Defects'
        if (hash.indexOf('/BridgeCapacities') !== -1 || hash.indexOf('BridgeCapacities-manage') !== -1) return 'Bridge Capacity'
        if (hash.indexOf('ChangeDocuments') !== -1) return 'Change Documents'
        if (hash.indexOf('AttributeClasses') !== -1 || hash.indexOf('/AttributeGroups') !== -1) return 'Attribute Classes'
        if (hash.indexOf('EAMMapping') !== -1 || hash.indexOf('/EAMCodeMapping') !== -1) return 'EAM Code Mapping'
        return 'Bridge Asset Registry'
      }

      function updateTitle() {
        var title = titleForHash()
        document.title = title
        if (sap.ushell && sap.ushell.Container) {
          sap.ushell.Container.getServiceAsync('ShellUIService').then(function (service) {
            if (service && service.setTitle) service.setTitle(title)
          }).catch(function () {})
        }
        var appTitleButton = document.getElementById('shellAppTitle-button')
        if (appTitleButton && appTitleButton.innerText !== title) {
          appTitleButton.innerText = title
          appTitleButton.title = 'Navigation menu'
          appTitleButton.setAttribute('aria-label', title)
        }
      }

      window.addEventListener('hashchange', updateTitle)
      setInterval(updateTitle, 500)
    })
  </script>
