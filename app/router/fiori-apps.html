  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ushell.Container.createRenderer('fiori2', true).then(function (r) { r.placeAt('content') })
      function titleForHash() {
        var h = window.location.hash || ''
        if (h.indexOf('BridgeInspections') !== -1) return 'Inspections'
        if (h.indexOf('BridgeDefects') !== -1) return 'Defects'
        if (h.indexOf('BridgeCapacities') !== -1) return 'Bridge Capacity'
        if (h.indexOf('ChangeDocuments') !== -1) return 'Change Documents'
        if (h.indexOf('AttributeClasses') !== -1 || h.indexOf('/AttributeGroups') !== -1) return 'Attribute Classes'
        if (h.indexOf('EAMMapping') !== -1) return 'EAM Code Mapping'
        if (h.indexOf('BridgeRisk') !== -1) return 'Bridge Risk'
        if (h.indexOf('RestrictionsDashboard') !== -1) return 'Restrictions Dashboard'
        if (h.indexOf('NetworkRestrictions') !== -1) return 'Network Restrictions'
        if (h.indexOf('AssetStrategy') !== -1) return 'Asset Class Strategy'
        if (h.indexOf('RiskBands') !== -1) return 'Risk Bands'
        if (h.indexOf('RiskFactors') !== -1) return 'Risk Factors'
        return 'Bridge Asset Registry'
      }
      function updateTitle() {
        var t = titleForHash(); document.title = t
        if (sap.ushell && sap.ushell.Container) {
          sap.ushell.Container.getServiceAsync('ShellUIService').then(function (s) { if (s && s.setTitle) s.setTitle(t) }).catch(function () {})
        }
        var b = document.getElementById('shellAppTitle-button')
        if (b && b.innerText !== t) { b.innerText = t; b.title = 'Navigation menu'; b.setAttribute('aria-label', t) }
      }
      window.addEventListener('hashchange', updateTitle); setInterval(updateTitle, 500)
    })
