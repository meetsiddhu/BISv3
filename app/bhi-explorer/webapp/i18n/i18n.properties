# BHI / BSI Explorer — base bundle (English). supportedLocales=[""] (no locale files).
appTitle=BHI / BSI Explorer
appDescription=Bridge Structure & Health Index — calculations, element breakdown, cross-mode normalisation

#XFLD: bridge picker label
pick=Bridge
#XMSG: picker cap note — {0} = configured cap (the list is truncated, not the full register)
pickCapNote=List shows the first {0} bridges by name — type to filter within the loaded list.

#XTIT: panel headers
crossMode=Condition health across modes (normalised per-mode element weights)
formulas=Formulas (substituted values)
elements=Element breakdown (worst rating per bucket x weight)
models=Multi-model BSI comparison - the SAME inputs under each mode weight set

#XFLD: KPI tiles
tile.bsi=BSI / 10
tile.bhi=BHI / 100
tile.rsl=Remaining service life
tile.priority=Priority
#XFLD: {0} = remaining service life in years
fmt.rslYears={0} years
#XFLD: {0} = element coverage percent
fmt.coverage=Element coverage {0}%
#XFLD: {0} = BSI score (0-10)
fmt.outOf10={0} / 10
#XFLD: {0} = BHI score (0-100)
fmt.outOf100={0} / 100
#XFLD: {0} = average BHI for a mode row
fmt.bhi=BHI {0}
#XFLD: headline suffix when element-level data drove the score
headline.elementData=element data
#XFLD: headline suffix when the register condition rating fallback was used
headline.fallback=register-condition fallback

#XCOL: element breakdown table
col.bucket=Element bucket
col.weight=Weight
col.worstRating=Worst rating
#XCOL: multi-model table
col.model=Mode weight model
col.weights=Weights
col.bsi=BSI
#XCOL: cross-mode table
col.mode=Mode
col.bridges=Bridges
col.avgBsi=Avg BSI
col.worstBsi=Worst BSI
col.avgBhi=Avg BHI

#XFLD: rating cell when an element bucket has no data and is excluded from the score
noDataExcluded=no data (excluded)

#YMSG: empty states
empty.title=No bridge selected
empty.text=Choose a bridge from the list above to see its BSI / BHI breakdown, element ratings and formulas.
elements.noData=No element data for this bridge — the score used the register-condition fallback.
models.noData=No model comparison available for this bridge.
crossMode.noData=No cross-mode condition data yet — run computeBhi to populate BSI / BHI scores.

#YMSG: errors (shown in MessageStrips, not toasts)
err.bridgeList=Bridge list unavailable — the prioritisation service did not respond. Reload to retry.
err.crossMode=Cross-mode view unavailable — run computeBhi first, then reload.
#YMSG: {0} = technical error message
err.detail=Could not load the bridge detail: {0}
