<!doctype html>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge Management System (BMS)</title>

  <script>
    (function () {
      var xhr = new XMLHttpRequest()
      xhr.open('GET', '/appconfig/fioriSandboxConfig.json', false)
      xhr.send(null)
      var tileConfig = xhr.status === 200 ? JSON.parse(xhr.responseText) : {}

      // Freeze groups/catalogs so sandbox.js cannot merge SAP sample apps into our config
      var _groups = (tileConfig.services && tileConfig.services.LaunchPage &&
                     tileConfig.services.LaunchPage.adapter &&
                     tileConfig.services.LaunchPage.adapter.config &&
                     tileConfig.services.LaunchPage.adapter.config.groups) || []
      Object.defineProperty(
        tileConfig.services.LaunchPage.adapter.config,
        'groups',
        { get: function() { return _groups }, set: function() {}, configurable: true, enumerable: true }
      )
      Object.defineProperty(
        tileConfig.services.LaunchPage.adapter.config,
        'catalogs',
        { get: function() { return [] }, set: function() {}, configurable: true, enumerable: true }
      )
      Object.defineProperty(
        tileConfig.services.LaunchPage.adapter.config,
        'catalogueEntries',
        { get: function() { return [] }, set: function() {}, configurable: true, enumerable: true }
      )

      window['sap-ushell-config'] = Object.assign({
        defaultRenderer: 'fiori2',
        bootstrapConfig: { mergeApplications: false, mergeCatalogs: false },
        renderers: {
          fiori2: {
            componentData: {
              config: { enableSearch: false }
            }
          }
        }
      }, tileConfig)
    })()
  </script>

  <script
    id="sap-ushell-bootstrap"
    src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js">
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ushell,sap.collaboration,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-theme="sap_horizon">
  </script>

  <script>
    sap.ui.getCore().attachInit(() => {
      sap.ushell.Container
        .createRenderer('fiori2', true)
        .then(renderer => renderer.placeAt('content'))
    })
  </script>
</head>

<body class="sapUiBody" id="content"></body>

</html>
