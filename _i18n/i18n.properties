# ── Validation messages ────────────────────────────────────────────────────
# CAP server-side i18n uses positional placeholders: {0}, {1}, {2}, ...
MANDATORY_FIELD_MISSING = {0} is required
INVALID_INTEGER = {0} must be a whole number
INVALID_INTEGER_WITH_RANGE = {0} must be a whole number between {1} and {2}
INVALID_NUMBER = {0} must be a valid number
INVALID_NUMBER_WITH_RANGE = {0} must be a valid number between {1} and {2}
VALUE_OUT_OF_RANGE = {0} must be between {1} and {2}. {3}
